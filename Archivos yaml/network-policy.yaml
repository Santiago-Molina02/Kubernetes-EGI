apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: frontend-policy
  namespace: inventario

spec:
  podSelector:
    matchLabels:
      app: frontend

  policyTypes:
  - Egress

  egress:
  - to:
    - podSelector:
        matchLabels:
          app: api-sql

  - to:
    - podSelector:
        matchLabels:
          app: api-mongo
