apiVersion: apps/v1
kind: Deployment

metadata:
  name: api-mongo
  namespace: inventario

spec:
  replicas: 1

  selector:
    matchLabels:
      app: api-mongo

  template:
    metadata:
      labels:
        app: api-mongo

    spec:
      containers:
      - name: api-mongo
        image: api-mongo:latest

        ports:
        - containerPort: 8080
